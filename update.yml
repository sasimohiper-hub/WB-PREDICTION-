name: 🔄 WongBagus Auto Update

on:
  schedule:
    # Setiap 1 jam (UTC) = WIB +7
    - cron: '0 * * * *'
  workflow_dispatch:  # bisa trigger manual dari GitHub

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 🕷️ Run fetcher
        run: |
          python fetch_all.py

      - name: 💾 Commit & Push data
        run: |
          git config user.name "WongBagus Bot"
          git config user.email "bot@wongbagus.github.io"
          git add data/result.json
          # Hanya commit jika ada perubahan
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data baru."
          else
            TIMESTAMP=$(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M WIB')
            git commit -m "🔄 Auto update: $TIMESTAMP"
            git push
          fi
