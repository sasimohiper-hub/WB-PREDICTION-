name: Fetch Paito Teks

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (scrape 1 slug saja)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: Test fetch 1 slug dulu
        run: python fetch_paito_teks.py --test

      - name: Run full fetch (hanya jika test OK & bukan test_mode)
        if: ${{ github.event.inputs.test_mode != 'true' }}
        run: python fetch_paito_teks.py

      - name: Commit & push paito-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paito-data.json
          git diff --staged --quiet || git commit -m "chore: update paito-data.json [$(date +'%Y-%m-%d %H:%M')] [skip ci]"
          git push
