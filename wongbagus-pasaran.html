    background: linear-gradient(135deg, #0f1729 0%, #1a0a00 100%);

    display: flex;
    align-items: center;
    justify-content: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(240,180,41,0.15);
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    box-shadow: 0 0 16px rgba(240,180,41,0.4);
  }

  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.08em;
  }

  .logo-text span {
    color: var(--gold);
  }

  .logo-sub {
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: block;
    margin-top: 1px;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 28px 20px 16px;
  }

  .hero h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1rem, 4vw, 1.5rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(240,180,41,0.4);
  }

  .hero p {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* SEARCH */
  .search-wrap {
    padding: 0 16px 16px;
    max-width: 500px;
    margin: 0 auto;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.85rem;
    padding: 10px 40px 10px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(240,180,41,0.12);
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 0 16px 16px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .stats-bar span { color: var(--gold); font-weight: 700; }

  /* SECTION */
  .section {
    padding: 0 12px 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: linear-gradient(90deg, var(--card), transparent);
    border-left: 3px solid var(--gold);
    border-radius: 0 6px 6px 0;
    margin-bottom: 10px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .section-header .count {
    margin-left: auto;
    background: rgba(240,180,41,0.15);
    color: var(--gold);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.68rem;
  }

  /* GRID */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }

  /* CARD */
  .market-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px 8px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .market-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .market-card:hover {
    transform: translateY(-2px);
    border-color: var(--gold);
    box-shadow: 0 6px 20px rgba(240,180,41,0.15);
  }

  .market-card:hover::before { opacity: 1; }

  .market-card:active {
    transform: scale(0.97);
  }

  .flag {
    font-size: 22px;
    line-height: 1;
  }

  .market-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: 0.01em;
  }

  .market-arrow {
    font-size: 0.6rem;
    color: var(--gold);
    opacity: 0.7;
  }

  /* FEATURED badge */
  .featured-section .market-card {
    border-color: rgba(240,180,41,0.3);
  }

  .featured-section .market-card:hover {
    border-color: var(--gold);
    box-shadow: 0 6px 24px rgba(240,180,41,0.25);
  }

    display: none;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .no-result svg { display: block; margin: 0 auto 10px; opacity: 0.4; }

  /* FOOTER */

    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 0.7rem;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

    .market-name { font-size: 0.65rem; }
    .flag { font-size: 18px; }

  { name: "Weimar",                    flag: "🇩🇪", slug: "weimar" },
  { name: "West Virginia",             flag: "🇺🇸", slug: "west-virginia" },
  { name: "Wisconsin Evening",         flag: "🇺🇸", slug: "wisconsin-evening" },
  { name: "Yokohama",                  flag: "🇯🇵", slug: "yokohama" },
  { name: "Zurich",                    flag: "🇨🇭", slug: "zurich" },
];

// =============================================
// RENDER CARD
// =============================================
function makeUrl(slug) {
  return `https://rumusangkanet.com/paito-teks-${slug}/`;
}

function makeCard(m) {
  const a = document.createElement('a');
  a.className = 'market-card';
  a.href = makeUrl(m.slug);
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.dataset.name = m.name.toLowerCase();
  a.innerHTML = `
    <span class="flag">${m.flag}</span>
    <span class="market-name">${m.name}</span>
    <span class="market-arrow">▶</span>
  `;
  return a;
}

const featGrid = document.getElementById('featGrid');
const allGrid  = document.getElementById('allGrid');
const featCount = document.getElementById('featCount');
const allCount  = document.getElementById('allCount');
const totalCount = document.getElementById('totalCount');

FEATURED.forEach(m => featGrid.appendChild(makeCard(m)));
ALL_MARKETS.forEach(m => allGrid.appendChild(makeCard(m)));

const total = FEATURED.length + ALL_MARKETS.length;
featCount.textContent = FEATURED.length;
allCount.textContent  = ALL_MARKETS.length;
totalCount.textContent = total;

// =============================================
// SEARCH
// =============================================
const searchInput = document.getElementById('searchInput');
const noResult    = document.getElementById('noResult');
const featSection = document.getElementById('featSection');
const allSection  = document.getElementById('allSection');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyVisible = false;

  const filterGrid = (grid, sectionEl, countEl, dataArr) => {
    let visible = 0;
    Array.from(grid.children).forEach(card => {
      const match = !q || card.dataset.name.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    sectionEl.style.display = visible ? '' : 'none';
    countEl.textContent = visible;
    if (visible) anyVisible = true;
  };

  filterGrid(featGrid, featSection, featCount, FEATURED);
  filterGrid(allGrid,  allSection,  allCount,  ALL_MARKETS);

  noResult.style.display = anyVisible ? 'none' : 'block';
});
</script>
