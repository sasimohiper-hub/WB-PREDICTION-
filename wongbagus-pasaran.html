    justify-content: center;

  .logo-text {

  }

  .logo-text span {

  .logo-sub {

    margin-top: 6px;

    max-width: 500px;
    margin: 0 auto;
  }

  .search-box {

  }

  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.85rem;
    padding: 10px 40px 10px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(240,180,41,0.12);
  }

  .search-box input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 0 16px 16px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .stats-bar span { color: var(--gold); font-weight: 700; }

    padding: 0 12px 16px;
    max-width: 700px;
    margin: 0 auto;

    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: linear-gradient(90deg, var(--card), transparent);

    border-radius: 0 6px 6px 0;
    margin-bottom: 10px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);

    background: rgba(240,180,41,0.15);
    color: var(--gold);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.68rem;
  }

  /* GRID */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }

  /* CARD */
  .market-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px 8px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .market-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .market-card:hover {
    transform: translateY(-2px);
    border-color: var(--gold);
    box-shadow: 0 6px 20px rgba(240,180,41,0.15);
  }

  .market-card:hover::before { opacity: 1; }

  .market-card:active {
    transform: scale(0.97);
  }

  .flag {
    font-size: 22px;
    line-height: 1;
  }

  .market-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: 0.01em;

  .market-arrow {
    font-size: 0.6rem;
    color: var(--gold);
    opacity: 0.7;

  }

    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.85rem;

    padding: 20px;

    font-size: 0.7rem;
    border-top: 1px solid var(--border);

      return;
    } catch(e) { continue; }
  }
  console.warn('[ResultData] gagal load');
}

// Format tanggal dari string ISO "2026-06-07"
function fmtIso(iso) {
  if (!iso) return '-';
  try {
    const [y, mo, d] = iso.split('-');
    const dt = new Date(+y, +mo - 1, +d);
    const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    return `${days[dt.getDay()]} ${d}/${mo}/${String(y).slice(-2)}`;
  } catch(e) { return iso; }
}

// =============================================
// RENDER CARD
// =============================================
function makeCard(m) {
  const entry = m.key ? RESULT_DB[m.key] : null;
  // history[0] = terbaru, history[N-1] = terlama
  const history = entry ? (entry.history || []) : [];
  const latest = history.length ? history[0] : null;
  const count = history.length;

  const a = document.createElement('a');
  a.className = 'market-card' + (latest ? ' has-data' : '');
  a.href = '#';
  a.dataset.name = m.name.toLowerCase();
  a.dataset.slug = m.slug;
  a.innerHTML = `
    <span class="flag">${m.flag}</span>
    <span class="market-name">${m.name}</span>
    ${latest
      ? `<span class="card-result">${latest.result}</span>
         <span class="card-date">${fmtIso(latest.date)}</span>
         <span class="card-count">${count} data</span>`
      : `<span class="card-result no-data">----</span>
         <span class="card-date">Belum ada data</span>`
    }
    <span class="market-arrow">▶</span>
  `;

  a.addEventListener('click', (e) => {
    e.preventDefault();
    openPaitoPanel(m, entry);
  });
  return a;
}

// =============================================
// PANEL PAITO INLINE
// =============================================
function openPaitoPanel(m, entry) {
  const old = document.getElementById('paitoPanel');
  if (old) old.remove();

  // history[0]=terbaru → reverse → terlama di atas, terbaru di bawah
  const history = entry ? [...(entry.history || [])].reverse() : [];
  const panel = document.createElement('div');
  panel.id = 'paitoPanel';
  panel.className = 'paito-panel';

  let rows = '';
  history.forEach((h, i) => {
    const isLast = i === history.length - 1;
    rows += `<tr${isLast ? ' class="row-latest"' : ''}>
      <td class="td-no">${i + 1}</td>
      <td class="td-date">${fmtIso(h.date)}</td>
      <td class="td-result">${h.result}</td>
      <td class="td-2d">${h.result.slice(-2)}</td>
    </tr>`;
  });

  panel.innerHTML = `
    <div class="panel-header">
      <span class="panel-flag">${m.flag}</span>
      <span class="panel-title">${m.name}</span>
      <span class="panel-count">${history.length} data</span>
      <button class="panel-close" onclick="document.getElementById('paitoPanel').remove()">✕</button>
    </div>
    <div class="panel-actions">
      <button class="btn-copy" onclick="copyPaitoData('${m.name}')">📋 Salin Data</button>
      <button class="btn-copy-name" onclick="copyText('${m.name}')">🏷️ Salin Nama</button>
    </div>
    ${history.length === 0
      ? '<div class="panel-empty">Belum ada data tersimpan</div>'
      : `<div class="panel-table-wrap" id="paitoTableWrap">
          <table class="panel-table" id="paitoTable">
            <thead><tr>
              <th>#</th><th>Tanggal</th><th>Result</th><th>2D</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`
    }
  `;

  // Scroll ke bawah (terbaru) setelah render
  document.getElementById('mainContainer').prepend(panel);
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(() => {
    const wrap = document.getElementById('paitoTableWrap');
    if (wrap) wrap.scrollTop = wrap.scrollHeight;
  }, 150);
}

// Copy seluruh data (terlama→terbaru) ke clipboard
function copyPaitoData(name) {
  const panel = document.getElementById('paitoPanel');
  if (!panel) return;
  const rows = panel.querySelectorAll('#paitoTable tbody tr');
  if (!rows.length) return;
  let text = name + '\n';
  rows.forEach(tr => {
    const cells = tr.querySelectorAll('td');
    // format: tanggal result
    text += `${cells[1].textContent}  ${cells[2].textContent}\n`;
  });
  navigator.clipboard.writeText(text.trim()).then(() => {
    showToast('Data tersalin!');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text.trim();
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('Data tersalin!');
  });
}

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(() => {
    showToast('Nama tersalin!');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = txt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('Nama tersalin!');
  });
}

function showToast(msg) {
  let t = document.getElementById('copyToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'copyToast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 20px;border-radius:20px;font-size:.85rem;font-weight:700;z-index:9999;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => t.style.opacity = '0', 1800);
}

const featGrid = document.getElementById('featGrid');
const allGrid  = document.getElementById('allGrid');
const featCount = document.getElementById('featCount');
const allCount  = document.getElementById('allCount');
const totalCount = document.getElementById('totalCount');

function renderAll() {
  featGrid.innerHTML = '';
  allGrid.innerHTML  = '';
  FEATURED.forEach(m => featGrid.appendChild(makeCard(m)));
  ALL_MARKETS.forEach(m => allGrid.appendChild(makeCard(m)));
  const total = FEATURED.length + ALL_MARKETS.length;
  featCount.textContent  = FEATURED.length;
  allCount.textContent   = ALL_MARKETS.length;
  totalCount.textContent = total;
}

// Render awal (tanpa data), lalu load data → re-render
renderAll();
loadResultData();

// =============================================
// SEARCH
// =============================================
const searchInput = document.getElementById('searchInput');
const noResult    = document.getElementById('noResult');
const featSection = document.getElementById('featSection');
const allSection  = document.getElementById('allSection');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyVisible = false;

  const filterGrid = (grid, sectionEl, countEl, dataArr) => {
    let visible = 0;
    Array.from(grid.children).forEach(card => {
      const match = !q || card.dataset.name.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    sectionEl.style.display = visible ? '' : 'none';
    countEl.textContent = visible;
    if (visible) anyVisible = true;
  };

  filterGrid(featGrid, featSection, featCount, FEATURED);
  filterGrid(allGrid,  allSection,  allCount,  ALL_MARKETS);

  noResult.style.display = anyVisible ? 'none' : 'block';
});
</script>
