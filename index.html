        const data = await res.json();

// ===== LOAD DATA =====
const FLAG_MAP={
  hkg:'🇭🇰',sgp:'🇸🇬',syd:'🇦🇺',jpn:'🇯🇵',twn:'🇹🇼',
  ncd:'🇺🇸',cmb2:'🇰🇭',be:'🇳🇿',chn:'🇨🇳',sp:'🇧🇷'
};

function normalizeResults(arr, dateField, resultField){
  return arr.map(h=>{
    const d=h[dateField]||h.date||h.tanggal||h.tgl||'';
    const res=h[resultField]||h.result||h.angka||h.keluaran||h.nomor||'';
    return {date:d, result:String(res)};
  }).filter(h=>h.result);
}

function parseEntry(k, v){
  const flag = v.flag||v.negara||(v.info&&v.info.negara)||FLAG_MAP[k]||'🌐';
  const name = v.name||v.nama||(v.info&&v.info.nama)||k.toUpperCase();
  let arr = v.results||v.hasil||v.data||v.keluaran||[];
  if(!Array.isArray(arr)) arr=[];
  let dateField='date', resultField='result';
  if(arr.length){
    const s=arr[0];
    if(s.tanggal) dateField='tanggal';
    else if(s.tgl) dateField='tgl';
    if(s.angka) resultField='angka';
    else if(s.keluaran) resultField='keluaran';
    else if(s.nomor) resultField='nomor';
  }
  const results=normalizeResults(arr, dateField, resultField);
  if(results.length>=2){
    const d0=new Date(results[0].date), d1=new Date(results[1].date);
    if(!isNaN(d0)&&!isNaN(d1)&&d0<d1) results.reverse();
  }
  return {name, flag, results};
}

function applyRawData(raw){
  const src = raw.pasaran||raw.data||raw;
  if(typeof src==='object'&&!Array.isArray(src)){
    Object.entries(src).forEach(([k,v])=>{
      if(typeof v!=='object'||Array.isArray(v)) return;
      DB[k]=parseEntry(k,v);
      MARKET_META[k]={flag:DB[k].flag};
    });
  }
}

async function loadData(){
  // Pakai data bawaan dulu agar langsung bisa scan
  if(!Object.keys(DB).length){
    applyRawData(DEMO_DATA);
    renderGrid();
    populateMarketSelect();
    document.getElementById('last-upd').textContent='📦 Data lokal (2026-06-04)';
  }

  // Coba fetch data terbaru dari server
  try{
    const r=await fetch('result.json?t='+Date.now());
    if(!r.ok) throw new Error('no file');
    const raw=await r.json();
    // Reset DB lalu isi dari server
    Object.keys(DB).forEach(k=>delete DB[k]);
    applyRawData(raw);
    if(!Object.keys(DB).length) throw new Error('empty');
    renderGrid();
    populateMarketSelect();
    const keys2=Object.keys(DB);
    const lat2=DB[keys2[0]]&&DB[keys2[0]].results&&DB[keys2[0]].results[0];
    if(lat2) document.getElementById('last-upd').textContent='📅 Update server: '+lat2.date;
  }catch(e){
    // Tetap pakai data bawaan yang sudah di-load tadi
  }
}

function getTodayStr(){return new Date().toISOString().slice(0,10);}

function renderGrid(){
  const grid=document.getElementById('mgrid');
  const today=getTodayStr();
  const keys=Object.keys(DB);
  if(!keys.length){grid.innerHTML='<div class="loading">Tidak ada data</div>';return;}

  let html='';
  keys.forEach(k=>{
    const m=DB[k];
    const meta={flag: m.flag || (MARKET_META[k]&&MARKET_META[k].flag) || '🌐'};
    const name=m.name||k.toUpperCase();
    const rows=m.results||[];
    const lat=rows[0]||null;
    const isToday=lat&&lat.date===today;
    const num=(lat?lat.result:'').replace(/\D/g,'');
    const dateStr=lat?lat.date:'-';
    let digits='';
    if(num.length>=4){
      num.slice(-4).split('').forEach(d=>{digits+=`<div class="mc-d">${d}</div>`;});
    } else {
      digits='<div class="mc-d" style="background:#e2e8f0;color:#94a3b8;font-size:10px;width:auto;padding:0 5px;">-</div>';
    }
    html+=`<div class="mc">
      <div class="mc-hd">
        <span style="font-size:17px;">${meta.flag}</span>
        <h3>${name}</h3>
        <span class="mc-live ${isToday?'today':''}">${isToday?'🟢 LIVE':dateStr}</span>
      </div>
      <div class="mc-bd">
        <span class="mc-date">${dateStr}</span>
        <div class="mc-digits">${digits}</div>
      </div>
      <div class="mc-ft">
        <button class="mc-btn w" onclick="alert('Buka paito_warna.html di GitHub Pages')">WARNA</button>
        <button class="mc-btn h" onclick="alert('Buka paito_harian.html di GitHub Pages')">HARIAN</button>
      </div>
    </div>`;
  });
  grid.innerHTML=html;
}

function populateMarketSelect(){
  const sel=document.getElementById('m-market');
  const keys=Object.keys(DB);
  if(!keys.length) return;
  // Rebuild semua option dari DB
  sel.innerHTML='';
  keys.forEach(k=>{
    const m=DB[k];
    const opt=document.createElement('option');
    opt.value=k;
    opt.textContent=(m.flag||'')+' '+k.toUpperCase()+' | '+(m.name||k);
    sel.appendChild(opt);
  });
}

              'm10','m11','m12','m13','m14','m15','m16','m17','m18','m19','mistik'];

// Parse satu elemen: bisa "A5" atau "A5mb"
// Return nilai digit 0-9, atau null jika gagal
function parseElemCode(code, hist) {
  if (!code || code==='-') return null;

  // Coba parse format: BASE_ELEM + optional_mod
  // Contoh: A5mb, K4ml, Js3ix, Jt2ty, J3D1mb
  // Pertama extract modifier di akhir
  let baseCode = code;
  let elemMod = '-';
  // Cek apakah ada modifier di akhir (ix,ty,ml,mb,m0-m19)
  const modMatch = code.match(/^(.+?)(ix|ty|ml|mb|m1[0-9]|m[0-9])$/);
  if (modMatch) {
    baseCode = modMatch[1];
    elemMod = modMatch[2];
  }

  // Parse baseCode
  let rawVal = null;

  // Handle J3D, J4D
  const specialMatch = baseCode.match(/^(J3D|J4D|Js|Jt|Jd|JS|JT|JD)(\d+)$/i);
  if (specialMatch) {
    const pre = specialMatch[1].toUpperCase();
    const n = parseInt(specialMatch[2]);
    const r = hist[n-1];
    if (!r || !/^\d{4}$/.test(r)) return null;
    const A=+r[0],C=+r[1],K=+r[2],E=+r[3];
    switch(pre){
      case 'JS':  rawVal=digitalRoot(Math.abs(K-E)); break;
      case 'JT':  rawVal=digitalRoot(C+K); break;
      case 'JD':  rawVal=digitalRoot(A+C); break;
      case 'J3D': rawVal=digitalRoot(C+K+E); break;
      case 'J4D': rawVal=digitalRoot(A+C+K+E); break;
      default: return null;
    }
  } else {
    const m = baseCode.match(/^([A-Za-z]+)(\d+)$/);
    if (!m) return null;
    const pre = m[1].toUpperCase();
    const n = parseInt(m[2]);
    const r = hist[n-1];
    if (!r || !/^\d{4}$/.test(r)) return null;
    const A=+r[0],C=+r[1],K=+r[2],E=+r[3];
    switch(pre){
      case 'A':  rawVal=A; break;
      case 'C':  rawVal=C; break;
      case 'K':  rawVal=K; break;
      case 'E':  rawVal=E; break;
      case 'J':  rawVal=digitalRoot(K+E); break;
      case 'JS': rawVal=digitalRoot(Math.abs(K-E)); break;
      case 'JT': rawVal=digitalRoot(C+K); break;
      case 'JD': rawVal=digitalRoot(A+C); break;
      default: return null;
    }
  }

  if (rawVal === null) return null;
  // Apply modifier per-elemen jika ada
  return elemMod !== '-' ? applyMod(rawVal, elemMod) : rawVal;
}

function digitalRoot(n){
  n = Math.abs(n);
  if(n===0) return 0;
  return n%9===0 ? 9 : n%9;
}

function applyOp(a,b,op){
  if(op==='+') return digitalRoot(a+b);
  if(op==='-') return digitalRoot(Math.abs(a-b));
  if(op==='.') return digitalRoot(a*b);
  return a;
}

function applyMod(v,mod){
  if(!mod||mod==='-'||mod==='mistik') return v;
  // MOD_TABLE lookup: gunakan digital root untuk key lookup
  const vKey = digitalRoot(Math.abs(v))%10;
  return (MOD_TABLE[mod]||{})[vKey]??v;
}

function calcFormula(e1,o1,e2,mod,hist){
  const v1 = parseElemCode(e1,hist);
  if(v1===null) return null;
  if(!e2||e2==='-') return mod&&mod!=='-'?applyMod(v1,mod):v1;
  const v2 = parseElemCode(e2,hist);
  if(v2===null) return mod&&mod!=='-'?applyMod(v1,mod):v1;
  const res = applyOp(v1,v2,o1||'+');
  return mod&&mod!=='-'?applyMod(res,mod):res;
}

function makePred(start, nDigit, cols) {
  // start bisa > 9 (misal hasil J=15), tabel geser 10 angka dari start
  const t = Array.from({length:10},(_,i)=>(start+i)%10);
  const c = cols || getColsByDigit(nDigit);
  // Output SORTED ASC sesuai angkanet
  const digits = c.slice(0, nDigit).map(i=>t[i]);
  digits.sort((a,b)=>a-b);
  return digits.join('');
}

function getColsByDigit(nDigit) {
  // Kolom A=0..J=9 dari tabel geser 10 angka
  // VERIFIED dari angkanet — output selalu sorted ascending
  if(nDigit===1)  return [9];
  if(nDigit===2)  return [5,9];
  if(nDigit===3)  return [1,5,9];
  if(nDigit===4)  return [0,1,4,6];
  if(nDigit===5)  return [0,4,5,6,9];
  if(nDigit===6)  return [0,1,4,5,6,9];
  if(nDigit===7)  return [0,1,3,4,5,6,9];
  if(nDigit===8)  return [0,1,2,4,5,6,7,9];
  if(nDigit===9)  return [0,1,2,3,4,5,6,7,9];
  return [0,4,5,6,9]; // default 5
}

function getSrHistory(wbId, max) {
  const entry = WBData.get(wbId);
  if (!entry) return [];
  let results = [];
  if (entry.history && entry.history.length > 0) {
    results = entry.history.map(h => String(h.result||'').trim()).filter(r => /^\d{4}$/.test(r));
  }
  const todayR = String(entry.result||'').trim();
  // Tambahkan today hanya jika berbeda dari history[0]
  if (/^\d{4}$/.test(todayR) && results[0] !== todayR) {
    results.unshift(todayR);
  } else if (results.length === 0 && /^\d{4}$/.test(todayR)) {
    results.unshift(todayR);
  }
  // Hapus duplikat berurutan (bukan Set karena bisa ada angka sama di periode berbeda)
  const deduped = results.filter((r, i) => i === 0 || r !== results[i-1]);
  return deduped.slice(0, max||60);
}

// ── LOGIKA HIT ──
function checkHit(result, predStr, jenis) {
  const s = String(result).zfill4();
  const A=+s[0],C=+s[1],K=+s[2],E=+s[3];
  const digits = predStr.split('').map(Number);

  if (jenis.startsWith('ai_')) {
    // AI: salah satu digit target hadir di prediksi (OR)
    const pos = jenis.slice(3);
    if(pos==='ke') return digits.includes(K) || digits.includes(E);
    if(pos==='ac') return digits.includes(A) || digits.includes(C);
    if(pos==='ck') return digits.includes(C) || digits.includes(K);
  }

  if (jenis.startsWith('bbfs_')) {
    // BBFS: semua digit target WAJIB ada (AND)
    // KECUALI kalau twin/kembar (misal K=E) → cukup 1 digit cocok
    const pos = jenis.slice(5);
    if(pos==='ke') {
      if(K===E) return digits.includes(K);
      return digits.includes(K) && digits.includes(E);
    }
    if(pos==='ac') {
      if(A===C) return digits.includes(A);
      return digits.includes(A) && digits.includes(C);
    }
    if(pos==='ck') {
      if(C===K) return digits.includes(C);
      return digits.includes(C) && digits.includes(K);
    }
    if(pos==='4d') {
      // 4D: semua digit unik harus ada (duplikat cukup 1)
      const targets = [...new Set([A,C,K,E])];
      return targets.every(d => digits.includes(d));
    }
    return false;
  }

  if (jenis.startsWith('pos_')) {
    const pos = jenis.slice(4);
    let target;
    if(pos==='e') target=E;
    else if(pos==='k') target=K;
    else if(pos==='a') target=A;
    else if(pos==='c') target=C;
    else return false;
    return digits.includes(target);
  }
  return false;
}

String.prototype.zfill4 = function(){return this.padStart(4,'0');};

function doScan(offset){
  const market   = document.getElementById('m-market').value;
  const day      = document.getElementById('m-layout').value;
  const limit    = Math.max(5,parseInt(document.getElementById('m-limit').value)||15);
  const jenis    = document.getElementById('m-tipe').value;   // ai_ke, bbfs_ke, pos_e, dll
  const ref      = document.getElementById('m-ref').value;
  const showAsli = document.getElementById('m-digit').checked;
  const v1       = document.getElementById('m-v1').value;
  const op1      = document.getElementById('m-op1').value;
  const v2       = document.getElementById('m-v2').value;
  const nDigit   = parseInt(document.getElementById('m-digit-out')||{value:5}).value || 5;

  // Ambil history pasaran dari WBData
  // Coba WBData dulu, fallback ke DB lama
  let hist = [];
  const wbEntry = (typeof WBData !== 'undefined') ? WBData.get(market) : null;
  if(wbEntry && wbEntry.history && wbEntry.history.length > 0){
    hist = getSrHistory(market, limit+25);
  } else if(DB && DB[market] && DB[market].results){
    hist = DB[market].results.map(r=>r.result).filter(r=>/^\d{4}$/.test(r));
  }
  if(!hist.length){ document.getElementById('trek-output').innerHTML='Data market tidak tersedia.'; return; }
  if(hist.length < 2){ document.getElementById('trek-output').innerHTML='Data tidak cukup.'; return; }

  // Filter hari
  if(day){
    const entry2 = WBData.get(market);
    const allH = (entry2&&entry2.history)||[];
    const DN=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const filtered = allH.filter(h=>h.date&&DN[new Date(h.date).getDay()]===day).map(h=>h.result).filter(r=>/^\d{4}$/.test(r));
    if(filtered.length>=3) hist=filtered;
  }

  // Bangun formula dari dropdown
  const e1  = v1||'-';
  const o1s = op1||'+';
  const e2  = v2||'-';
  const mod = document.getElementById('m-mx')?document.getElementById('m-mx').value:'-';

  const colsHit = getColsByDigit(nDigit);

  // Bangun rows: hist[0]=terbaru, histnya urut terbaru dulu
  const rows = [];
  // Row 0: terbaru (isNext=true)
  const sub0   = hist.slice(0);
  const start0 = calcFormula(e1,o1s,e2,mod,sub0);
  rows.push({result:hist[0], keyVal:start0, isNext:true});

  for(let i=1; i<=limit && i<hist.length; i++){
    const subH    = hist.slice(i);
    const keyVal  = subH.length ? calcFormula(e1,o1s,e2,mod,subH) : null;
    const nextRes = hist[i-1];
    const predStr = keyVal!==null ? makePred(keyVal,nDigit,colsHit) : '--';
    const isHit   = keyVal!==null ? checkHit(nextRes,predStr,jenis) : false;
    rows.push({result:hist[i], keyVal, nextResult:nextRes, isNext:false, isHit, predStr, noData:keyVal===null});
  }

  // Pred next
  const nextRow = rows[0];
  const predNext = (nextRow&&nextRow.keyVal!==null) ? makePred(nextRow.keyVal,nDigit,colsHit) : '--';

  // Hitung patah real
  let patahReal=0;
  for(let i=1;i<rows.length;i++){
    if(rows[i].keyVal===null||rows[i].predStr==='--') continue;
    if(!rows[i].isHit) patahReal++;
  }

  const formula = (e1!=='-'?e1:'?')+(e2!=='-'?o1s+e2:'')+(mod&&mod!=='-'?'['+mod+']':'');
  document.getElementById('resultLabel').textContent='rumus '+jenis.toUpperCase()+' '+formula;

  // Render: terlama dulu (rowsDisp = rows reversed)
  const rowsDisp = [...rows].reverse();

  const lines = rowsDisp.map(row=>{
    const r = String(row.result).padStart(4,'0');
    if(row.isNext) return '<span>'+r+' = '+predNext+' ?</span>';
    if(row.keyVal===null||row.predStr==='--') return '<span style="color:#94a3b8">'+r+' =</span>';

    // Highlight digit prediksi yang masuk ke result berikutnya
    const ns  = String(row.nextResult||'').padStart(4,'0');
    const nA=+ns[0],nC=+ns[1],nK=+ns[2],nE=+ns[3];
    const targets = getTargets(nK,nE,nA,nC,jenis);

    const predHtml = row.predStr.split('').map(d=>{
      const dn=+d;
      const kena=targets.includes(dn);
      if(kena){
        const color=row.isHit?'#10b981':'#ef4444';
        return '<span style="color:'+color+';font-weight:700">'+d+'</span>';
      }
      return d;
    }).join('');

    const endLabel = row.isHit
      ? (jenis.startsWith('ai')?' ai':' '+jenis.replace('_',' ').toUpperCase())
      : ' <span style="color:#ef4444;font-weight:700">\u00d7</span>';

    return '<span>'+r+' = '+predHtml+endLabel+'</span>';
  }).join('\n');

  const jenisDisp = jenis.replace('_',' ').toUpperCase();
  const headerLine = 'rumus AI '+nDigit+' Digit (Patah Real: '+patahReal+')\n'+formula;
  const aiLine = '\n'+jenisDisp+' : '+predNext;

  // Simpan data untuk Save Rumus
  _lastScanData = {
    market, formula, jenis, nDigit,
    predNext, patahReal,
    e1, e2, o1s, mod
  };

    document.getElementById('trek-output').innerHTML =
    '<div style="font-family:\'Courier New\',monospace;font-size:13px;line-height:1.6;color:#334155;background:#fff;padding:15px;border-radius:6px;white-space:pre-wrap">'
    +'<b style="color:#1e293b">'+headerLine+'</b>\n'
    +lines
    +'<b style="color:#334155">'+aiLine+'</b>'
    +'</div>';

  scanOffset=offset;
}

document.getElementById('btnNext').addEventListener('click',()=>doScan(0));

// ── BANK RUMUS ──
let _lastScanData = null; // disimpan oleh doScan

function saveRumus(){
  if(!_lastScanData){
    alert('Scan dulu sebelum save!');
    return;
  }
  const bank = JSON.parse(localStorage.getItem('wb_bank_v1')||'[]');
  const entry = {
    id: 'rms_'+Date.now(),
    savedAt: new Date().toLocaleString('id-ID'),
    ..._lastScanData
  };
  bank.unshift(entry);
  localStorage.setItem('wb_bank_v1', JSON.stringify(bank.slice(0,50))); // max 50
  renderBank();
  const btn = document.getElementById('btnSave');
  btn.textContent = '✅ Saved!';
  setTimeout(()=>btn.textContent='💾 Save', 1500);
}

function renderBank(){
  const bank = JSON.parse(localStorage.getItem('wb_bank_v1')||'[]');
  const list = document.getElementById('bank-list');
  const empty = document.getElementById('bank-empty');
  if(!bank.length){
    list.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  list.innerHTML = bank.map((r,idx)=>`
    <div style="background:#141726;border:1px solid #252a45;border-radius:8px;padding:10px 12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="font-size:11px;font-weight:800;color:#22d3ee;font-family:monospace">${r.market.toUpperCase()} · ${r.formula}</div>
        <button onclick="deleteRumus(${idx})" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:13px;padding:0 4px">✕</button>
      </div>
      <div style="font-size:12px;color:#f59e0b;font-weight:700;font-family:monospace;margin-bottom:2px">Pred: ${r.predNext}</div>
      <div style="font-size:10px;color:#6b7280">${r.jenis.toUpperCase()} · ${r.nDigit}D · Patah ${r.patahReal} · ${r.savedAt}</div>
    </div>
  `).join('');
}

function deleteRumus(idx){
  const bank = JSON.parse(localStorage.getItem('wb_bank_v1')||'[]');
  bank.splice(idx,1);
  localStorage.setItem('wb_bank_v1', JSON.stringify(bank));
  renderBank();
}

function clearBank(){
  if(!confirm('Hapus semua rumus tersimpan?')) return;
  localStorage.removeItem('wb_bank_v1');
  renderBank();
}

renderBank(); // init tampil saat load
